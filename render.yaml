services:
  - type: web
    name: pizzeria-web-service-front
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_SOCKET_URL
        sync: false
      - key: REACT_APP_INSTAGRAM_URL
        sync: false
      - key: SEO_BACKEND_API_URL
        sync: false
      - key: SEO_CACHE_TTL_MS
        value: "300000"
      - key: SEO_FETCH_TIMEOUT_MS
        value: "6000"
